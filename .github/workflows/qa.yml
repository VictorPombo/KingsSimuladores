name: QA — Testes Críticos

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-critical:
    name: Testes E2E Críticos (@critical)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Criar .env.test com secrets do repositório
        run: |
          cat > .env.test << 'EOF'
          BASE_URL=https://www.kingssimuladores.com.br
          NEXT_PUBLIC_URL_KINGS=https://www.kingssimuladores.com.br
          NEXT_PUBLIC_URL_MSU=https://www.meusimuladorusado.com.br
          EOF
          echo "MP_ACCESS_TOKEN_KINGS=${{ secrets.MP_ACCESS_TOKEN_KINGS_TEST }}" >> .env.test
          echo "MP_ACCESS_TOKEN_SEVEN=${{ secrets.MP_ACCESS_TOKEN_SEVEN_TEST }}" >> .env.test
          echo "MP_ACCESS_TOKEN_MSU=${{ secrets.MP_ACCESS_TOKEN_MSU_TEST }}" >> .env.test
          echo "NEXT_PUBLIC_MP_PUBLIC_KEY=${{ secrets.MP_PUBLIC_KEY_TEST }}" >> .env.test
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.test
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.test
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.test
          echo "MP_WEBHOOK_SECRET=${{ secrets.MP_WEBHOOK_SECRET }}" >> .env.test
          echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env.test

      - name: Rodar testes críticos
        run: npm run qa:critical
        env:
          CI: true

      - name: Upload relatório HTML (em caso de falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/reports/html/
          retention-days: 7

      - name: Upload screenshots de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: tests/reports/results/
          retention-days: 7
